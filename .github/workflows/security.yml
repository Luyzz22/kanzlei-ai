name: Security Gates

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly full scan on main (DSGVO Art. 32 / NIS2 Art. 21 continuous monitoring)
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write   # Required for CodeQL SARIF upload
  actions: read

jobs:
  # ── CodeQL — Static Analysis (SAST) ────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Extend default queries with security-extended suite
          queries: security-extended,security-and-quality

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # CodeQL autobuild for JS/TS (no compilation step needed)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ── Semgrep — Rule-based SAST (OWASP Top 10, custom rules) ─────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=p/default \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/react \
            --config=p/nextjs \
            --sarif \
            --output=semgrep.sarif \
            --error
        env:
          # Optional: authenticate for Pro rules (set SEMGREP_APP_TOKEN as secret)
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── Gitleaks — Secret Scanning ─────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for Gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE required for org-level scanning (set as secret if needed)
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Dependency Audit ────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (critical blocks CI; high logged only)
        # Remaining HIGH CVEs in next@14.x all require next@15 (major upgrade, accepted risk).
        # CRITICAL vulnerabilities fail CI; HIGH are logged without failing.
        run: |
          pnpm audit --audit-level=high || true
          pnpm audit --audit-level=critical
