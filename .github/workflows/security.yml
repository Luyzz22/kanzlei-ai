name: Security Gates

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly scan on main (DSGVO Art. 32 / NIS2 Art. 21 continuous monitoring)
    - cron: "0 2 * * *"

permissions:
  contents: read
  actions: read

jobs:
  # ── CodeQL note ────────────────────────────────────────────────────────────
  # GitHub code scanning / Advanced Security is not available for this private
  # personal repository. CodeQL SARIF upload would fail before producing a
  # usable gate. Keep Semgrep, Gitleaks and dependency audit active here.

  # ── Semgrep — Rule-based SAST (audit mode during standalone split) ─────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep audit scan
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/react \
            --config=p/nextjs \
            --sarif-output=semgrep.sarif || true
        env:
          # Optional: authenticate for Pro rules (set SEMGREP_APP_TOKEN as secret)
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

  # ── Gitleaks — Secret Scanning (current tree, blocking) ─────────────────────
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks current tree scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose

  # ── Dependency Audit ────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (critical blocks CI; high logged only)
        # Remaining HIGH CVEs in next@14.x all require next@15 (major upgrade, accepted risk).
        # CRITICAL vulnerabilities fail CI; HIGH are logged without failing.
        run: |
          pnpm audit --audit-level=high || true
          pnpm audit --audit-level=critical
