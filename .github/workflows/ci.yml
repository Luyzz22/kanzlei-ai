name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      # Dummy app env (keine Secrets)
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dummy_dummy_dummy_dummy_dummy_dummy_dummy_dummy
      SCIM_BEARER_TOKENS: dummy

      # Ephemeral CI database (service container)
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Migrations smoke test (empty DB baseline flow)
        run: ./scripts/migrate-empty-db-baseline.sh

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Contract evals (mock + Modell-Matrix, keine API-Keys)
        env:
          EVAL_MODEL_MATRIX: gpt-4o-mini,claude-sonnet-4,gemini-2.5-pro
        run: pnpm eval:contracts

      - name: Build
        run: pnpm build
